name: Deploy Personal Finance Tracker to Production VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux, vps]

    steps:
      - name: Sync latest code
        run: |
          cd /home/fadlan/finance-tracker
          git fetch origin main
          git reset --hard origin/main

      - name: Build and restart containers
        run: |
          cd /home/fadlan/finance-tracker
          docker compose -p finance-tracker -f docker-compose.prod.yml up -d --build --remove-orphans

      - name: Check containers
        run: |
          cd /home/fadlan/finance-tracker
          docker compose -p finance-tracker -f docker-compose.prod.yml ps

      - name: Clean unused Docker images
        run: |
          docker image prune -f
