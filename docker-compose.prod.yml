services:
  mongodb:
    image: mongo:7
    platform: linux/amd64
    container_name: finance_mongo_prod
    restart: always
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data_prod:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    networks:
      - finance_net_prod

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/backend:latest
    container_name: finance_backend_prod
    restart: always
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017
      MONGO_DB: ${MONGO_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
    depends_on:
      - mongodb
    networks:
      - finance_net_prod

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/frontend:latest
    container_name: finance_frontend_prod
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - finance_net_prod

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: finance_tunnel_prod
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
      - backend
    networks:
      - finance_net_prod

volumes:
  mongo_data_prod:

networks:
  finance_net_prod:
    driver: bridge
